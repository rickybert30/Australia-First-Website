name: Deploy to GitHub Pages

# Publishes the static site (index.html + assets/ + data/) to GitHub Pages.
# No build step — the site is plain HTML/CSS/JS that fetches data/candidates.json.

# Deploy from main only — work lands on main via PR, so publishing the working
# branch would push unreviewed content to the live site.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build SQLite database for the in-browser SQL explorer
        # Generates data/candidates.db (git-ignored) from the committed JSON so
        # explore.html can fetch and query it client-side.
        run: python3 scripts/build_db.py

      - name: Stage the public site
        # Publish only the site itself — not build scripts, the db/ dump, or repo
        # docs (those stay on GitHub and are linked from the About page). data/ is
        # published in full deliberately: the dataset is the product.
        run: |
          mkdir _site
          cp index.html explore.html about.html 404.html robots.txt sitemap.xml .nojekyll _site/
          [ -f CNAME ] && cp CNAME _site/ || true
          cp -r assets _site/assets
          cp -r data _site/data

      - name: Configure Pages
        # Requires Pages to be enabled once in repo settings
        # (Settings -> Pages -> Build and deployment -> Source: GitHub Actions).
        # The workflow token cannot enable Pages itself.
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

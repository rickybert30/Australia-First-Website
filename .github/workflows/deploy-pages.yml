name: Deploy to GitHub Pages

# Publishes the static site (index.html + assets/ + data/) to GitHub Pages.
# No build step — the site is plain HTML/CSS/JS that fetches data/candidates.json.

on:
  push:
    branches:
      - claude/au-candidates-database-fkzef8
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build SQLite database for the in-browser SQL explorer
        # Generates data/candidates.db (git-ignored) from the committed JSON so
        # explore.html can fetch and query it client-side.
        run: python3 scripts/build_db.py

      - name: Configure Pages
        # Requires Pages to be enabled once in repo settings
        # (Settings -> Pages -> Build and deployment -> Source: GitHub Actions).
        # The workflow token cannot enable Pages itself.
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
